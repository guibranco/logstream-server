name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:

  # ── 1. Unit tests ─────────────────────────────────────────────────────────────
  test:
    name: 🧪 Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v6

      - name: 🐘 Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: sockets, pcntl, pdo_mysql, zip
          coverage: none

      - name: 💾 Cache Composer dependencies
        uses: actions/cache@v5
        with:
          path: /tmp/composer-cache
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: 📦 Install dependencies
        run: composer install --no-interaction --no-progress

      - name: 🧪 Run unit tests
        run: vendor/bin/phpunit --testdox --testsuite unit

  # ── 2. Integration tests ──────────────────────────────────────────────────────
  integration_tests:
    name: 🔌 Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [test]

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v6

      - name: 🐳 Build and start containers
        run: API_SECRET=test-secret UI_SECRET=test-ui-secret docker compose up -d --build

      - name: 🔧 Make scripts executable
        run: |
          chmod +x Tools/wait-for-healthy.sh
          chmod +x tests/endpoint-tests.sh

      - name: ⏳ Wait for all containers to be healthy
        run: Tools/wait-for-healthy.sh 120

      - name: 🔌 Run HTTP endpoint tests
        run: tests/endpoint-tests.sh http://localhost:8081 test-secret test-ui-secret

      - name: 📋 Dump container logs on failure
        if: failure()
        run: docker compose logs --tail=100

      - name: 🛑 Stop containers
        if: always()
        run: docker compose down -v

  # ── 3. Determine version ──────────────────────────────────────────────────────
  version:
    name: 🏷️ Determine Version
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [integration_tests]
    outputs:
      fullSemVer: ${{ steps.gitversion.outputs.fullSemVer }}

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: 🔧 Install GitVersion
        uses: gittools/actions/gitversion/setup@v4.4.2
        with:
          versionSpec: "6.x"

      - name: 🏷️ Determine version number
        id: gitversion
        uses: gittools/actions/gitversion/execute@v4.4.2

  # ── 4. Deploy via SSH (git pull) ──────────────────────────────────────────────
  deploy:
    name: 🚀 Deploy to Server
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [version]
    environment: production

    steps:
      - name: 🔑 Write SSH private key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.SSH_PORT || 22 }} ${{ secrets.SSH_HOST }} \
            >> ~/.ssh/known_hosts 2>/dev/null

      - name: 🚀 Pull latest code and restart
        run: |
          ssh -i ~/.ssh/deploy_key \
              -p ${{ secrets.SSH_PORT || 22 }} \
              -o StrictHostKeyChecking=no \
              ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
              bash -s << 'ENDSSH'
            set -e

            echo "📥 Pulling latest code..."
            cd /opt/logstream-server
            sudo -u logstream git pull origin main

            echo "📦 Installing dependencies..."
            sudo -u logstream composer install \
              --no-dev \
              --optimize-autoloader \
              --no-interaction \
              --no-progress

            echo "🔍 Verifying public/ directory..."
            if [ -d "public" ]; then
              echo "✅ public/ is present:"
              ls -la public/
            else
              echo "❌ public/ directory is missing"
              exit 1
            fi

            echo "♻️  Restarting service..."
            sudo systemctl restart logstream-server

            echo "⏳ Waiting for service to be healthy..."
            for i in $(seq 1 20); do
              HTTP=$(curl -o /dev/null -s -w "%{http_code}" \
                http://localhost:8081/api/health || echo "000")
              if [[ "$HTTP" == "200" ]]; then
                echo "✅ Service is healthy (attempt $i)"
                exit 0
              fi
              echo "   Attempt $i — HTTP $HTTP, retrying in 3s..."
              sleep 3
            done

            echo "❌ Service did not become healthy in time"
            exit 1
          ENDSSH

      - name: 🔍 Verify Swagger UI is reachable
        run: |
          HTTP=$(curl -o /dev/null -s -w "%{http_code}" \
            "${{ secrets.HEALTH_CHECK_URL }}/docs")
          if [[ "$HTTP" == "200" ]]; then
            echo "✅ Swagger UI is reachable at /docs"
          else
            echo "⚠️  Swagger UI returned HTTP $HTTP — check public/ on the server"
            exit 1
          fi

      - name: 🧹 Remove private key
        if: always()
        run: rm -f ~/.ssh/deploy_key

  # ── 5. Database migrations ────────────────────────────────────────────────────
  database_migrations:
    name: 🗄️ Database Migrations
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      actions: write
      contents: write
    needs: [deploy]

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: 🔍 Detect SQL changes
        uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            sql:
              - "migrations/**"

      - name: ⏭️ Skip if no SQL changes
        if: steps.changes.outputs.sql == 'false'
        run: echo "No migration changes — skipping."

      - name: 🔑 Write SSH private key
        if: steps.changes.outputs.sql == 'true'
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.SSH_PORT || 22 }} ${{ secrets.SSH_HOST }} \
            >> ~/.ssh/known_hosts 2>/dev/null

      - name: 🗄️ Run migrations on server
        if: steps.changes.outputs.sql == 'true'
        run: |
          ssh -i ~/.ssh/deploy_key \
              -p ${{ secrets.SSH_PORT || 22 }} \
              -o StrictHostKeyChecking=no \
              ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
              bash -s << 'ENDSSH'
            set -e
            cd /opt/logstream-server
            chmod +x Tools/db-migration.sh
            Tools/db-migration.sh migrations \
              "$DB_HOST" "$DB_USER" "$DB_NAME"
          ENDSSH

      - name: 🧹 Remove private key
        if: always()
        run: rm -f ~/.ssh/deploy_key

  # ── 6. GitHub Release ─────────────────────────────────────────────────────────
  create_release:
    name: 📢 Create GitHub Release
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    needs: [version, deploy, database_migrations]

    steps:
      - name: 🏷️ Create release
        uses: ncipollo/release-action@v1.21.0
        with:
          skipIfReleaseExists: true
          allowUpdates: false
          draft: false
          makeLatest: true
          tag: v${{ needs.version.outputs.fullSemVer }}
          name: Release v${{ needs.version.outputs.fullSemVer }}
          generateReleaseNotes: true
          body: |
            ## logstream-server v${{ needs.version.outputs.fullSemVer }}
            Built from `${{ github.sha }}`
