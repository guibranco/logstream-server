<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>logstream-server — API Docs</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/swagger-ui/5.17.14/swagger-ui.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    html, body {
      margin: 0; padding: 0; min-height: 100vh;
      background: #0f1117;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    /* ── Top banner ─────────────────────────────────────────────────────────── */
    .ls-banner {
      background: linear-gradient(135deg, #1a1d27 0%, #12151f 100%);
      border-bottom: 1px solid #2a2d3d;
      padding: 0 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      height: 56px;
      position: sticky;
      top: 0;
      z-index: 1000;
    }
    .ls-banner__logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
    .ls-banner__icon {
      width: 28px; height: 28px;
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
    }
    .ls-banner__name  { font-size: 15px; font-weight: 600; color: #e2e8f0; letter-spacing: -0.01em; }
    .ls-banner__version {
      font-size: 11px; color: #64748b;
      background: #1e2130; border: 1px solid #2a2d3d; border-radius: 4px; padding: 2px 7px;
    }
    .ls-banner__spacer { flex: 1; }
    .ls-banner__link {
      display: flex; align-items: center; gap: 6px;
      color: #64748b; text-decoration: none; font-size: 13px;
      padding: 6px 10px; border-radius: 6px; transition: color .15s, background .15s;
    }
    .ls-banner__link:hover { color: #94a3b8; background: #1e2130; }
    .ls-banner__health {
      display: flex; align-items: center; gap: 6px;
      font-size: 12px; color: #64748b;
      padding: 0 12px; border-left: 1px solid #2a2d3d;
    }
    .ls-banner__health-dot {
      width: 7px; height: 7px; border-radius: 50%; background: #374151;
    }
    .ls-banner__health-dot.online  { background: #22c55e; box-shadow: 0 0 6px #22c55e88; }
    .ls-banner__health-dot.offline { background: #ef4444; }

    /* ── Storage mode selector bar ──────────────────────────────────────────── */
    .ls-mode-bar {
      background: #12151f;
      border-bottom: 1px solid #2a2d3d;
      padding: 10px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .ls-mode-bar__label {
      font-size: 12px; font-weight: 600; color: #64748b;
      text-transform: uppercase; letter-spacing: .05em;
      white-space: nowrap;
    }
    .ls-mode-tabs { display: flex; gap: 4px; }
    .ls-mode-tab {
      font-size: 12px; font-weight: 600;
      padding: 5px 14px; border-radius: 6px; cursor: pointer;
      border: 1px solid #2a2d3d;
      background: transparent; color: #64748b;
      transition: all .15s;
    }
    .ls-mode-tab:hover { background: #1e2130; color: #94a3b8; }
    .ls-mode-tab.active.file   { background: #1c2a1c; border-color: #166534; color: #4ade80; }
    .ls-mode-tab.active.mariadb { background: #1c1f2e; border-color: #1d4ed8; color: #60a5fa; }
    .ls-mode-sep { width: 1px; height: 24px; background: #2a2d3d; }

    /* ── Auth info cards ─────────────────────────────────────────────────────── */
    .ls-auth-cards {
      display: flex; gap: 12px; flex-wrap: wrap; align-items: flex-start;
    }
    .ls-auth-card {
      border-radius: 8px; border: 1px solid #2a2d3d;
      padding: 10px 14px; min-width: 220px;
    }
    .ls-auth-card__title {
      font-size: 11px; font-weight: 700; text-transform: uppercase;
      letter-spacing: .05em; margin-bottom: 6px;
    }
    .ls-auth-card.write-file   { border-color: #166534; background: #0d1a0d; }
    .ls-auth-card.write-file .ls-auth-card__title { color: #4ade80; }
    .ls-auth-card.write-db     { border-color: #1d4ed8; background: #0d1020; }
    .ls-auth-card.write-db .ls-auth-card__title { color: #60a5fa; }
    .ls-auth-card.read-key     { border-color: #92400e; background: #1a1208; }
    .ls-auth-card.read-key .ls-auth-card__title { color: #fbbf24; }

    .ls-auth-row { display: flex; align-items: baseline; gap: 8px; margin-bottom: 3px; }
    .ls-auth-row:last-child { margin-bottom: 0; }
    .ls-auth-row__label { font-size: 11px; color: #64748b; white-space: nowrap; }
    .ls-auth-row__code  {
      font-family: 'JetBrains Mono','Fira Code',monospace;
      font-size: 11px; color: #94a3b8;
      background: #1e2130; padding: 2px 6px; border-radius: 4px;
    }

    [data-mode="file"]   .show-mariadb,
    [data-mode="mariadb"] .show-file { display: none !important; }

    /* ── Swagger UI overrides ────────────────────────────────────────────────── */
    #swagger-ui { max-width: 1200px; margin: 0 auto; padding: 24px 16px 48px; }
    .swagger-ui .topbar { display: none !important; }
    .swagger-ui, .swagger-ui .wrapper, .swagger-ui .opblock-tag-section,
    .swagger-ui .opblock, .swagger-ui .scheme-container,
    .swagger-ui section.models { background: transparent !important; }
    .swagger-ui .info { margin: 0 0 24px; }
    .swagger-ui .info .title { color: #e2e8f0; font-size: 26px; }
    .swagger-ui .info .description p,
    .swagger-ui .info .description td,
    .swagger-ui .info .description th,
    .swagger-ui .info li { color: #94a3b8 !important; }
    .swagger-ui .info table { border-color: #2a2d3d !important; }
    .swagger-ui .info th { background: #1a1d27 !important; color: #cbd5e1 !important; }
    .swagger-ui .info td { color: #94a3b8 !important; }
    .swagger-ui .opblock-tag { color: #cbd5e1 !important; border-bottom-color: #2a2d3d !important; }
    .swagger-ui .opblock-tag:hover { background: #1a1d27 !important; }
    .swagger-ui .opblock {
      border-radius: 8px !important; border: 1px solid #2a2d3d !important;
      margin-bottom: 8px !important; background: #12151f !important;
    }
    .swagger-ui .opblock .opblock-summary { background: transparent !important; }
    .swagger-ui .opblock .opblock-summary-description { color: #94a3b8 !important; }
    .swagger-ui .opblock .opblock-summary-path { color: #e2e8f0 !important; }
    .swagger-ui .opblock.opblock-get    { border-left: 3px solid #3b82f6 !important; }
    .swagger-ui .opblock.opblock-post   { border-left: 3px solid #22c55e !important; }
    .swagger-ui .opblock.opblock-delete { border-left: 3px solid #ef4444 !important; }
    .swagger-ui .opblock.opblock-put    { border-left: 3px solid #f59e0b !important; }
    .swagger-ui .opblock.opblock-patch  { border-left: 3px solid #a855f7 !important; }
    .swagger-ui .opblock-body, .swagger-ui .opblock-description-wrapper,
    .swagger-ui .response-col_description, .swagger-ui .response-col_status,
    .swagger-ui table thead tr th, .swagger-ui table thead tr td { color: #94a3b8 !important; }
    .swagger-ui .tab li, .swagger-ui .parameter__name,
    .swagger-ui .parameter__type, .swagger-ui label { color: #94a3b8 !important; }
    .swagger-ui input[type=text], .swagger-ui input[type=password],
    .swagger-ui textarea, .swagger-ui select {
      background: #1e2130 !important; color: #e2e8f0 !important; border-color: #2a2d3d !important;
    }
    .swagger-ui .btn { border-radius: 6px !important; }
    .swagger-ui .btn.authorize { background: #1d4ed8 !important; border-color: #1d4ed8 !important; color: #fff !important; }
    .swagger-ui .btn.execute   { background: #15803d !important; border-color: #15803d !important; color: #fff !important; }
    .swagger-ui .model-box, .swagger-ui section.models .model-container {
      background: #1a1d27 !important; border-color: #2a2d3d !important;
    }
    .swagger-ui .model { color: #94a3b8 !important; }
    .swagger-ui .model-title { color: #cbd5e1 !important; }
    .swagger-ui .highlight-code pre, .swagger-ui .microlight {
      background: #0f1117 !important; color: #94a3b8 !important;
    }
    .swagger-ui .scheme-container {
      background: #12151f !important; box-shadow: none !important;
      border: 1px solid #2a2d3d; border-radius: 8px; padding: 12px 16px !important;
    }
    .swagger-ui .auth-wrapper { background: #12151f !important; }
    .swagger-ui .auth-container { background: #1a1d27 !important; border-color: #2a2d3d !important; }
    .swagger-ui .dialog-ux .modal-ux { background: #1a1d27 !important; border-color: #2a2d3d !important; }
    .swagger-ui .dialog-ux .modal-ux-header { border-bottom-color: #2a2d3d !important; }
    .swagger-ui .dialog-ux .modal-ux-header h3 { color: #e2e8f0 !important; }
    .swagger-ui .servers-title, .swagger-ui .servers > label { color: #94a3b8 !important; }
    .swagger-ui .servers select {
      background: #1e2130 !important; color: #e2e8f0 !important; border-color: #2a2d3d !important;
    }
  </style>
</head>
<body>

  <!-- ── Top banner ──────────────────────────────────────────────────────────── -->
  <header class="ls-banner">
    <a class="ls-banner__logo" href="/">
      <div class="ls-banner__icon">📡</div>
      <span class="ls-banner__name">logstream-server</span>
    </a>
    <span class="ls-banner__version">v1.0.0</span>
    <div class="ls-banner__spacer"></div>
    <a class="ls-banner__link" href="https://github.com/guibranco/logstream-server"
       target="_blank" rel="noopener">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
        <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38
                 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13
                 -.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66
                 .07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15
                 -.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0
                 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82
                 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01
                 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>
      </svg>
      GitHub
    </a>
    <div class="ls-banner__health">
      <div class="ls-banner__health-dot" id="health-dot"></div>
      <span id="health-label">checking…</span>
    </div>
  </header>

  <!-- ── Storage mode + auth reference bar ────────────────────────────────────── -->
  <div class="ls-mode-bar" id="mode-bar" data-mode="file">

    <span class="ls-mode-bar__label">Storage mode</span>

    <div class="ls-mode-tabs">
      <button class="ls-mode-tab file active" id="btn-file" onclick="setMode('file')">
        📁 File storage
      </button>
      <button class="ls-mode-tab mariadb" id="btn-mariadb" onclick="setMode('mariadb')">
        🐬 MariaDB storage
      </button>
    </div>

    <div class="ls-mode-sep"></div>

    <div class="ls-auth-cards">

      <!-- File storage write auth -->
      <div class="ls-auth-card write-file show-file">
        <div class="ls-auth-card__title">✍ Write auth</div>
        <div class="ls-auth-row">
          <span class="ls-auth-row__label">Header:</span>
          <span class="ls-auth-row__code">Authorization</span>
        </div>
        <div class="ls-auth-row">
          <span class="ls-auth-row__label">Value:</span>
          <span class="ls-auth-row__code">Bearer &lt;API_SECRET&gt;</span>
        </div>
      </div>

      <!-- MariaDB write auth -->
      <div class="ls-auth-card write-db show-mariadb">
        <div class="ls-auth-card__title">✍ Write auth</div>
        <div class="ls-auth-row">
          <span class="ls-auth-row__label">X-Api-Key:</span>
          <span class="ls-auth-row__code">&lt;app_key&gt;</span>
        </div>
        <div class="ls-auth-row">
          <span class="ls-auth-row__label">X-Api-Token:</span>
          <span class="ls-auth-row__code">&lt;api_token&gt;</span>
        </div>
        <div class="ls-auth-row" style="margin-top:4px">
          <span class="ls-auth-row__label" style="color:#475569;font-size:10px">
            Credentials stored in the <code style="color:#60a5fa">clients</code> table
          </span>
        </div>
      </div>

      <!-- Read auth — same in both modes -->
      <div class="ls-auth-card read-key">
        <div class="ls-auth-card__title">👁 Read auth (both modes)</div>
        <div class="ls-auth-row">
          <span class="ls-auth-row__label">Header:</span>
          <span class="ls-auth-row__code">Authorization</span>
        </div>
        <div class="ls-auth-row">
          <span class="ls-auth-row__label">Value:</span>
          <span class="ls-auth-row__code">Bearer &lt;UI_SECRET&gt;</span>
        </div>
      </div>

    </div>
  </div>

  <!-- ── Swagger UI mount point ────────────────────────────────────────────────── -->
  <div id="swagger-ui"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/swagger-ui/5.17.14/swagger-ui-bundle.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/swagger-ui/5.17.14/swagger-ui-standalone-preset.min.js"></script>
  <script>
    // ── Storage mode toggle ─────────────────────────────────────────────────────
    const STORAGE_KEY = 'logservice:docs:mode';

    function setMode(mode) {
      document.getElementById('mode-bar').setAttribute('data-mode', mode);
      document.getElementById('btn-file').classList.toggle('active', mode === 'file');
      document.getElementById('btn-mariadb').classList.toggle('active', mode === 'mariadb');

      // Update the Swagger UI Authorize panel description hint
      const hint = document.getElementById('auth-mode-hint');
      if (hint) {
        hint.textContent = mode === 'file'
          ? 'File mode: use WriteKey (Bearer token).'
          : 'MariaDB mode: use ApiKey + ApiToken headers.';
      }

      try { localStorage.setItem(STORAGE_KEY, mode); } catch(_) {}
    }

    // Restore last-used mode
    try {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (saved === 'mariadb') setMode('mariadb');
    } catch(_) {}

    // ── Health check pulse ──────────────────────────────────────────────────────
    (function checkHealth() {
      const dot   = document.getElementById('health-dot');
      const label = document.getElementById('health-label');
      function ping() {
        fetch('/api/health')
          .then(r => r.json())
          .then(d => {
            dot.className     = 'ls-banner__health-dot online';
            label.textContent = `online · ${d.ws_connections} ws`;
          })
          .catch(() => {
            dot.className     = 'ls-banner__health-dot offline';
            label.textContent = 'offline';
          });
      }
      ping();
      setInterval(ping, 15000);
    })();

    // ── Swagger UI init ─────────────────────────────────────────────────────────
    window.onload = function () {
      SwaggerUIBundle({
        url:          '/openapi.yaml',
        dom_id:       '#swagger-ui',
        deepLinking:  true,
        presets: [
          SwaggerUIBundle.presets.apis,
          SwaggerUIStandalonePreset,
        ],
        plugins: [
          SwaggerUIBundle.plugins.DownloadUrl,
        ],
        layout:                   'StandaloneLayout',
        defaultModelsExpandDepth:  1,
        defaultModelExpandDepth:   2,
        docExpansion:             'list',
        filter:                    true,
        tryItOutEnabled:           true,
        persistAuthorization:      true,
        requestInterceptor: function (request) {
          // Strip "Bearer undefined" when no token is set in the Authorize dialog
          const auth = request.headers['Authorization'];
          if (auth === 'Bearer undefined' || auth === 'Bearer ') {
            delete request.headers['Authorization'];
          }
          return request;
        },
      });
    };
  </script>
</body>
</html>
